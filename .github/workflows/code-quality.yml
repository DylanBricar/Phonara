name: "code quality"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/unit/**"
      - "src-tauri/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/unit/**"
      - "src-tauri/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check translation consistency
        run: bun run check:translations

      - name: Scan committed files for obvious secrets
        run: bun run check:secrets

      - name: Run ESLint
        run: bun run lint

      - name: Run unit tests with coverage
        run: bun run test:unit

      - name: Run dependency audit
        run: bun audit

      - name: Run prettier
        run: bun run format:check
