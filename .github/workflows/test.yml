name: "test"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
  pull_request:
    paths:
      - "src-tauri/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  rust-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libvulkan-dev + glslc + spirv-headers let transcribe-cpp-sys build
          # ggml's Vulkan backend (the Linux `vulkan` feature). Mirrors the apt
          # set transcribe.cpp's native-ci uses to build -DTRANSCRIBE_VULKAN=ON.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libssl-dev libgtk-layer-shell-dev \
            libvulkan-dev glslc spirv-headers

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --locked --all-targets --all-features

  rust-audit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24 # v1
        with:
          file: src-tauri/Cargo.lock
          # quick-xml 0.39 remains in wayland-scanner 0.31.10 (build-time
          # proc-macro XML generation for Wayland). plist now resolves to
          # quick-xml 0.41; remove this ignore when wayland-rs updates.
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195
