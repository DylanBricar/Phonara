name: "Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute next version
        id: get-version
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const tags = releases
              .map(r => r.tag_name)
              .filter(t => /^v\d+\.\d+\.\d+$/.test(t))
              .sort((a, b) => {
                const pa = a.slice(1).split('.').map(Number);
                const pb = b.slice(1).split('.').map(Number);
                return pa[0] - pb[0] || pa[1] - pb[1] || pa[2] - pb[2];
              });
            let next;
            if (tags.length === 0) {
              next = '0.1.0';
            } else {
              const latest = tags[tags.length - 1].slice(1).split('.').map(Number);
              latest[2] += 1;
              next = latest.join('.');
            }
            core.info(`Next version: ${next}`);
            core.setOutput('version', next);
            return next;

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const version = '${{ steps.get-version.outputs.version }}';

            // Find previous release tag
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 5
            });
            const prevTag = releases.find(r => !r.draft)?.tag_name || '';

            // Get commits since previous release
            let commits = [];
            if (prevTag) {
              const { data: comparison } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: prevTag,
                head: 'main'
              });
              commits = comparison.commits.map(c => c.commit.message.split('\n')[0]);
            }

            // Group by type
            const groups = {
              '🚀 Features': [],
              '🐛 Bug Fixes': [],
              '🔧 Improvements': [],
              '📦 CI / Build': [],
              '📝 Other': []
            };

            for (const msg of commits) {
              if (msg.startsWith('feat')) groups['🚀 Features'].push(msg);
              else if (msg.startsWith('fix')) groups['🐛 Bug Fixes'].push(msg);
              else if (msg.startsWith('refactor') || msg.startsWith('perf') || msg.startsWith('chore')) groups['🔧 Improvements'].push(msg);
              else if (msg.startsWith('ci') || msg.startsWith('build')) groups['📦 CI / Build'].push(msg);
              else if (!msg.startsWith('merge') && !msg.startsWith('Merge')) groups['📝 Other'].push(msg);
            }

            // Build markdown
            let body = `## What's new in v${version}\n\n`;
            for (const [title, items] of Object.entries(groups)) {
              if (items.length === 0) continue;
              body += `### ${title}\n`;
              for (const item of items) {
                const clean = item.replace(/^(feat|fix|refactor|perf|chore|ci|build)(\(.*?\))?:\s*/, '');
                body += `- ${clean}\n`;
              }
              body += '\n';
            }

            if (prevTag) {
              body += `**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prevTag}...v${version}\n`;
            }

            return body;

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `v${{ steps.get-version.outputs.version }}`,
              body: `${{ steps.changelog.outputs.result }}`,
              draft: true,
              prerelease: false
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-15" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            apple_signing: false
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
            apple_signing: false
          - platform: "ubuntu-22.04" # Build .deb on 22.04
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
            apple_signing: true
          - platform: "ubuntu-24.04" # Build AppImage and RPM on 24.04
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
            apple_signing: true
          - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
            apple_signing: true
          - platform: "windows-latest" # Windows x64
            args: "--bundles nsis,msi"
            target: "x86_64-pc-windows-msvc"
            apple_signing: true

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: false
      apple_signing: ${{ matrix.apple_signing }}
      asset-prefix: "phonara"
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit

  publish-release:
    permissions:
      contents: write
    needs: [create-release, publish-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              draft: false
            })
