name: "Main Branch Build"

# Runs the primary desktop builds on every push to main so breakage is caught
# before a manual release is triggered. Other targets remain available via the
# build-test workflow.
# Artifacts are kept for 30 days so any commit on main has a downloadable,
# testable build.

on:
  push:
    branches: [main]

# Cancel earlier Main Branch Build runs on the same ref when a newer push
# lands. Distinct group from the Release workflow so both run in parallel.
concurrency:
  group: phonara-main-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      upload-artifacts: true
      sign-binaries: false
      apple_signing: false
