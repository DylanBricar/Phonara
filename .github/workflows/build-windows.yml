name: "Build Windows"

on:
  workflow_dispatch:
    inputs:
      create-release:
        description: "Create a GitHub release with the built artifacts"
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: phonara-windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: Build Windows x64
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      platform: windows-latest
      target: x86_64-pc-windows-msvc
      build-args: "--bundles nsis,msi"
      asset-prefix: phonara-windows
      upload-artifacts: true
      sign-binaries: false
      apple_signing: false
      no-cache: true

  release:
    name: Publish Windows release
    if: inputs.create-release
    needs: build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      # Required to create the explicitly requested Windows-only release.
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: phonara-windows-x86_64-pc-windows-msvc
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        env:
          APP_VERSION: ${{ steps.get-version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' artifacts < <(find artifacts -type f -print0)
          if (( ${#artifacts[@]} == 0 )); then
            echo "No Windows artifacts found" >&2
            exit 1
          fi

          notes=$(cat <<'EOF'
          Windows build of Phonara.

          Built from DylanBricar/Phonara.

          Note: This is an unsigned build. Windows SmartScreen may show a warning on first launch. Click "More info" then "Run anyway".
          EOF
          )

          gh release create "v${APP_VERSION}-windows" "${artifacts[@]}" \
            --title "v${APP_VERSION} (Windows)" \
            --notes "$notes" \
            --latest=false
